services:
  # --- S3 Backends ---
  minio-primary:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-secondary:
    image: minio/minio:latest
    command: server /data --console-address ":9003"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Kafka ---
  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "s3m-test-cluster"

  # --- S3M Services ---
  s3m-proxy:
    build:
      context: .
      target: final
    environment:
      S3M_LOG_LEVEL: info
      S3M_KAFKA__BOOTSTRAP_SERVERS: '["kafka:9092"]'
      S3M_BACKENDS: '[{"name": "primary", "endpoint_url": "http://minio-primary:9000", "access_key": "minioadmin", "secret_key": "minioadmin", "is_primary": true}, {"name": "secondary", "endpoint_url": "http://minio-secondary:9000", "access_key": "minioadmin", "secret_key": "minioadmin"}]'
    depends_on:
      minio-primary:
        condition: service_healthy
      minio-secondary:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "8000:8000"

  s3m-worker:
    build:
      context: .
      target: final
    command: python -m s3m.worker.app
    environment:
      S3M_LOG_LEVEL: info
      S3M_KAFKA__BOOTSTRAP_SERVERS: '["kafka:9092"]'
      S3M_BACKENDS: '[{"name": "primary", "endpoint_url": "http://minio-primary:9000", "access_key": "minioadmin", "secret_key": "minioadmin", "is_primary": true}, {"name": "secondary", "endpoint_url": "http://minio-secondary:9000", "access_key": "minioadmin", "secret_key": "minioadmin"}]'
    depends_on:
      kafka:
        condition: service_started
      s3m-proxy:
        condition: service_started

  # --- Test Runner ---
  pytest-runner:
    build:
      context: .
      target: test
    environment:
      S3M_PROXY_URL: http://s3m-proxy:8000
      S3M_SECONDARY_URL: http://minio-secondary:9000
      S3M_ACCESS_KEY: minioadmin
      S3M_SECRET_KEY: minioadmin
      S3M_REGION: us-east-1
    depends_on:
      s3m-proxy:
        condition: service_healthy
      s3m-worker:
        condition: service_started
