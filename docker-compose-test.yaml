services:
  # --- S3 Backends ---
  minio-primary:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-secondary:
    image: minio/minio:latest
    command: server /data --console-address ":9003"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Kafka ---
  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "s3mer-test-cluster"

  # --- S3MER Services ---
  s3mer-proxy:
    build:
      context: .
      target: final
    environment:
      S3MER_LOG_LEVEL: info
      S3MER_KAFKA__BOOTSTRAP_SERVERS: '["kafka:9092"]'
      S3MER_BACKENDS__primary__ENDPOINT_URL: http://minio-primary:9000
      S3MER_BACKENDS__primary__ACCESS_KEY: minioadmin
      S3MER_BACKENDS__primary__SECRET_KEY: minioadmin
      S3MER_BACKENDS__primary__IS_PRIMARY: "true"
      S3MER_BACKENDS__secondary__ENDPOINT_URL: http://minio-secondary:9000
      S3MER_BACKENDS__secondary__ACCESS_KEY: minioadmin
      S3MER_BACKENDS__secondary__SECRET_KEY: minioadmin
      S3MER_BACKENDS__secondary__IS_PRIMARY: "false"
    depends_on:
      minio-primary:
        condition: service_healthy
      minio-secondary:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/.internal/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "8000:8000"

  s3mer-worker:
    build:
      context: .
      target: final
    command: python -m s3mer.worker.app
    environment:
      S3MER_LOG_LEVEL: info
      S3MER_KAFKA__BOOTSTRAP_SERVERS: '["kafka:9092"]'
      S3MER_BACKENDS__primary__ENDPOINT_URL: http://minio-primary:9000
      S3MER_BACKENDS__primary__ACCESS_KEY: minioadmin
      S3MER_BACKENDS__primary__SECRET_KEY: minioadmin
      S3MER_BACKENDS__primary__IS_PRIMARY: "true"
      S3MER_BACKENDS__secondary__ENDPOINT_URL: http://minio-secondary:9000
      S3MER_BACKENDS__secondary__ACCESS_KEY: minioadmin
      S3MER_BACKENDS__secondary__SECRET_KEY: minioadmin
      S3MER_BACKENDS__secondary__IS_PRIMARY: "false"
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/.internal/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      kafka:
        condition: service_started
      s3mer-proxy:
        condition: service_started

  # --- Test Runner ---
  pytest-runner:
    build:
      context: .
      target: test
    environment:
      S3MER_PROXY_URL: http://s3mer-proxy:8000
      S3MER_SECONDARY_URL: http://minio-secondary:9000
      S3MER_ACCESS_KEY: minioadmin
      S3MER_SECRET_KEY: minioadmin
      S3MER_REGION: us-east-1
    depends_on:
      s3mer-proxy:
        condition: service_healthy
      s3mer-worker:
        condition: service_healthy
