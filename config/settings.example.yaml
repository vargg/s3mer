# s3mer proxy configuration
# Copy to config/settings.yaml and adjust values
#
# Backends are a map keyed by logical name. Override a single field via env, e.g.:
#   S3MER_BACKENDS__primary__SECRET_KEY
#   S3MER_BACKENDS__primary__ACCESS_KEY
#   S3MER_BACKENDS__secondary__ENDPOINT_URL

log_level: INFO
log_file: null                            # Optional: write structured JSON logs to this file path

# Global streaming defaults
stream_chunk_size: 65536                  # Chunk size (in bytes) for proxy piping (default 64KB)
max_memory_stream_buffer_size: 10485760   # Maximum memory buffer (in bytes) before spooling to disk (default 10MB)

backends:
  primary:
    endpoint_url: http://localhost:9000
    region: us-east-1
    access_key: minioadmin
    secret_key: minioadmin
    is_primary: true
    addressing_style: path
    priority: 0
    max_pool_connections: 25              # Max concurrent connection pool size
    connect_timeout: 10                   # Connect timeout in seconds
    read_timeout: 30                      # Read timeout in seconds
    max_attempts: 3                       # S3 API retry attempts

  secondary:
    endpoint_url: http://localhost:9002
    region: us-east-1
    access_key: minioadmin
    secret_key: minioadmin
    is_primary: false
    addressing_style: path
    priority: 1
    max_pool_connections: 15
    connect_timeout: 10
    read_timeout: 30
    max_attempts: 3

kafka:
  bootstrap_servers:
    - localhost:9094
  topic: s3mer.replication
  consumer_group: s3mer-workers
  concurrency: 2                          # Number of parallel workers/consumers per process
  replication_retry_delay: 1.0            # Base retry backoff delay (seconds)
  replication_max_retry_delay: 60.0       # Max retry backoff delay (seconds)
